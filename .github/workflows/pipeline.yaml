name: Pipeline CI/CD

on:
  workflow_call:
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_PASSWORD:
        required: true
      VM_HOST:
        required: true
      VM_USER:
        required: true
      VM_SSH_KEY:
        required: true

jobs:
  job1:
    name: Build and Push to Registry
    runs-on: ubuntu-latest
    steps:
      - name: Source Code Management
        uses: actions/checkout@v6.0.2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      
      - name: Set variables
        run: |
          echo "IMAGE_NAME=${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Build Image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
      
      - name: Push Image
        run: |
          docker push $IMAGE_NAME:$IMAGE_TAG
  job2:
    name: Deploy on VM
    runs-on: ubuntu-latest
    needs: job1
    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USER }}
        key: ${{ secrets.VM_SSH_KEY }}
        script: |
          CONTAINER_NAME=${{ github.event.repository.name }}

          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/$CONTAINER_NAME:${{ github.ref_name }}

          docker stop $CONTAINER_NAME || true
          docker rm $CONTAINER_NAME || true

          docker run -d \
            -p 8080:8080 \
            --name $CONTAINER_NAME \
            ${{ secrets.DOCKERHUB_USERNAME }}/$CONTAINER_NAME:${{ github.ref_name }}